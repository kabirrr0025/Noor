<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Project Noor - Chapter 2</title>
<style>
body{margin:0;font-family:Arial;background:linear-gradient(135deg,#ffd9e8,#fff5fa);overflow:hidden;display:flex;align-items:center;justify-content:center;height:100vh}
#gift,#env,#letter{transition:.8s}
.card{background:#ffffffc9;padding:30px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,.12);text-align:center}
#gift{font-size:90px;cursor:pointer;animation:f 2s infinite}
@keyframes f{50%{transform:translateY(-10px)}}
#env{display:none;cursor:pointer}
.envelope{width:320px;height:200px;background:#f8d7e4;position:relative;border-radius:8px}
.flap{position:absolute;left:0;top:0;width:100%;height:100px;background:#f3bfd3;clip-path:polygon(0 0,100% 0,50% 100%);transform-origin:top;transition:.8s}
.paper{position:absolute;left:20px;right:20px;bottom:10px;height:160px;background:#fff;border-radius:8px;transform:translateY(120px);transition:1s;padding:18px;box-sizing:border-box}
.open .flap{transform:rotateX(180deg)}
.open .paper{transform:translateY(-20px)}
#next{display:none;margin-top:15px;padding:10px 18px;border:none;border-radius:30px;background:#ff7dac;color:#fff;cursor:pointer}
</style></head>
<body>
<div class='card' id='gift' role="button" aria-label="Open gift" tabindex="0">
<div>🎁</div>
<p>Click the gift</p>
</div>
<div id='env' aria-hidden="true">
<div class='envelope' id='box' role="button" aria-label="Open envelope" tabindex="0">
<div class='flap'></div>
<div class='paper'>
<h3>Dear Noor ❤️</h3>
<p>Happy Birthday. This is only the beginning of your little story...</p>
<button id='next'>Continue →</button>
</div>
</div>
<p>Click the envelope</p>
</div>
<script>
// Use explicit element references for reliability
const gift = document.getElementById('gift');
const env = document.getElementById('env');
const box = document.getElementById('box');
const next = document.getElementById('next');

// Show envelope when gift clicked
function openGift(){
  gift.style.display = 'none';
  env.style.display = 'block';
  env.setAttribute('aria-hidden','false');
}

// Open envelope to reveal paper and show Next button
function openEnvelope(e){
  // don't trigger when clicking the "Continue" button inside
  if(box.classList.contains('open')) return;
  box.classList.add('open');
  next.style.display = 'inline-block';
}

// Navigate to chapter 3
function goToChapter3(e){
  // Prefer a real navigation instead of alert
  window.location.href = 'index_chapter3.html';
}

// Event listeners with keyboard support
gift.addEventListener('click', openGift);
gift.addEventListener('keydown', function(e){ if(e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openGift(); }});
box.addEventListener('click', openEnvelope);
box.addEventListener('keydown', function(e){ if(e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openEnvelope(); }});
next.addEventListener('click', goToChapter3);
next.addEventListener('keydown', function(e){ if(e.key === 'Enter' || e.key === ' ') { e.preventDefault(); goToChapter3(); }});
</script>
</body></html>
