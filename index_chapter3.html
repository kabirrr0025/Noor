<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Noor - Chapter 3</title>
<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffe4ef,#fff);
font-family:Georgia,serif;
overflow:hidden;
}
.card{
width:min(90%,700px);
background:rgba(255,255,255,.75);
backdrop-filter:blur(12px);
border-radius:22px;
padding:40px;
box-shadow:0 15px 35px rgba(255,120,170,.25);
position:relative;
}
.ribbon{
position:absolute;
top:-8px;
left:50%;
transform:translateX(-50%);
width:120px;
height:24px;
background:#f8b7cc;
border-radius:0 0 12px 12px;
}
h1{
font-size:2.5rem;
color:#ff5b95;
text-align:center;
margin-top:10px;
}
#letter{
white-space:pre-wrap;
font-size:1.08rem;
line-height:1.8;
min-height:260px;
}
.cursor{
display:inline-block;
width:8px;
background:#ff5b95;
animation:blink .8s infinite;
}
@keyframes blink{
50%{opacity:0;}
}
button{
margin-top:25px;
padding:12px 22px;
border:none;
border-radius:30px;
background:#ff7da8;
color:white;
font-size:1rem;
cursor:pointer;
display:none;
}
.flower{
position:absolute;
font-size:22px;
animation:fall linear infinite;
opacity:.6;
}
@keyframes fall{
from{transform:translateY(-10vh) rotate(0deg);} 
to{transform:translateY(110vh) rotate(360deg);} 
}
</style>
</head>
<body>

<div id="flowers"></div>

<div class="card">
<div class="ribbon"></div>

<h1>AIYEEEE ADITII ❤️</h1>

<div id="letter"></div><span class="cursor"></span>

<button id="next" type="button">Continue →</button>

</div>

<script>
for(let i=0;i<20;i++){
const f=document.createElement('div');
f.className='flower';
f.textContent='🌸';
f.style.left=Math.random()*100+'vw';
f.style.animationDuration=(6+Math.random()*6)+'s';
f.style.animationDelay=(-Math.random()*10)+'s';
document.body.appendChild(f);
}

const text=`Soo first of all...

HAPPIEST BDAY TO THE CRAZIESTTT AND PRETTIEST PERSON. ❤️

IDK MAN something to make u feel special.

I Loveee youuu sooo fucking muchhh aditi <3

Shuru hoja sher click krr,
WE DA BEST COUPLE IN BIG 2k26,
Every moment we spent together.

Welcome to our story. 🧿🌸`;

let i=0;
function type(){
if(i<text.length){
document.getElementById('letter').innerHTML+=text.charAt(i);
i++;
setTimeout(type,35);
}else{
const btn = document.getElementById('next');
btn.style.display='inline-block';
// ensure focus so keyboard users can press Enter
btn.focus();
}
}
type();

// Use addEventListener to reliably attach the click handler
document.getElementById('next').addEventListener('click', function(){
// Use assign so it behaves like a normal navigation and keeps history
window.location.assign('chapter4_scrapbook.html');
});

// Also allow Enter key to trigger when button is focused
document.addEventListener('keydown', function(e){
if((e.key === 'Enter' || e.key === ' ') && document.activeElement === document.getElementById('next')){
e.preventDefault();
document.getElementById('next').click();
}
});
</script>

</body>
</html>
