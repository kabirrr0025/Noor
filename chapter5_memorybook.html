<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Chapter5</title><style>
body{margin:0;background:linear-gradient(#ffe6f1,#fff);font-family:Georgia,serif;overflow:hidden}
#scene{height:100vh;display:flex;align-items:center;justify-content:center;position:relative}
.page{width:min(90vw,760px);height:min(78vh,520px);background:#fff;padding:28px;border-radius:14px;box-shadow:0 20px 50px rgba(0,0,0,.2);display:flex;flex-direction:column;align-items:center;justify-content:center;position:absolute;transition:.8s}
.turn{transform:rotateY(-90deg);opacity:0}
.photo{width:340px;max-width:90%;padding:12px;background:#fff;box-shadow:0 10px 25px rgba(0,0,0,.2);transform:rotate(-4deg);cursor:pointer}
.photo img{width:100%}.caption{margin-top:18px;font-style:italic;text-align:center}
#next{position:absolute;bottom:25px;padding:12px 24px;border:none;border-radius:30px;background:#ff78ab;color:#fff}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);align-items:center;justify-content:center;flex-direction:column}
#overlay img{max-width:80vw;max-height:70vh;border:10px solid #fff}
#overlay p{color:#fff;padding:20px;text-align:center}
</style></head><body>
<div id="scene"><div id="page" class="page"><div class="photo"><img id="pic" src="photo1.jpg"></div><div id="cap" class="caption"></div></div><button id="next">Next Memory →</button></div>
<div id="overlay"><img id="big"><p id="note"></p></div>
<script>
const photos=[
{img:"135BEEEA-5AAE-4052-A09D-0008BE4D5A47.jpg",cap:" U are indeed special to me yk that?. ❤️",note:"I miss u more crazier while seeing these."},
{img:"IMG_6663.jpg",cap:"KYA MUSKAN HAI OHH GAWDDD. 🌸",note:" U DA REAL BEAUTY DIVA."},
{img:"IMG_5094.PNG",cap:"Bchhi hi rhogi mere liye to. ✨",note:"Us when??"},
{img:"IMG_3906.jpg",cap:"Still one of my favorites. 🤍"Isi ko to bahu bnana tha shit."},
{img:"IMG_3254.JPG",cap:"My Noor. Always. ❤️",note:"Maybe i can thank you just for existing."}
];
let i=0;
function load(){pic.src=photos[i].img;cap.textContent=photos[i].cap;}
load();
document.querySelector(".photo").onclick=()=>{big.src=photos[i].img;note.textContent=photos[i].note;overlay.style.display="flex";}
overlay.onclick=()=>overlay.style.display="none";
next.onclick=()=>{page.classList.add("turn");setTimeout(()=>{if(i<photos.length-1)i++;load();page.classList.remove("turn");},800);}
</script></body></html>
