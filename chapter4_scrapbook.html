
<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Project Noor - Chapter 4</title>
<style>
body{margin:0;font-family:Arial;background:linear-gradient(#ffe4ef,#fffafc);overflow-x:hidden}
h1{text-align:center;color:#ff4f8b;padding:30px 0}
.grid{display:flex;flex-wrap:wrap;justify-content:center;gap:40px;padding:20px}
.card{width:260px;background:#fff;padding:12px 12px 25px;border-radius:6px;box-shadow:0 15px 30px rgba(0,0,0,.15);position:relative;transition:.4s;cursor:pointer}
.card:hover{transform:scale(1.05) rotate(0deg)!important}
.card img{width:100%;border-radius:4px;display:block}
.card p{font-family:cursive;text-align:center}
.tape{position:absolute;width:90px;height:24px;background:#fff8cdbb;left:50%;top:-10px;transform:translateX(-50%) rotate(-3deg)}
#light{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center}
#light img{max-width:90vw;max-height:85vh;border:12px solid white;border-radius:8px}
</style></head>
<body>
<h1>📖 Our Little Scrapbook 🌸</h1>
<div class="grid">
<div class='card' style='transform:rotate(-6deg)'>
<div class='tape'></div>
<img src="8df95bc3-ce30-4f9c-b310-6aa3a1781ef1.png">
<p> FOOL JAISI TM BHI HO🌸</p>
</div>

<div class='card' style='transform:rotate(-4deg)'>
<div class='tape'></div>
<img src="e6ca5323-d029-4bbf-b841-0ede90745732.png">
<p>Roots me Aditi gautam 🤍</p>
</div>

<div class='card' style='transform:rotate(-2deg)'>
<div class='tape'></div>
<img src="918f81a2-e44a-4077-89d4-777805443ada.png">
<p>One of my favorite smiles ❤️</p>
</div>

<div class='card' style='transform:rotate(0deg)'>
<div class='tape'></div>
<img src="7b99feaa-9d22-4339-a41a-fa34382c3ae2.png">
<p> BHONDU CERTIFIED😂</p>
</div>

<div class='card' style='transform:rotate(2deg)'>
<div class='tape'></div>
<img src="971c8b47-a17a-4723-bf06-54ea8e90e145.png">
<p> inshort MERI BANDI  ✨</p>
</div>

<div class='card' style='transform:rotate(4deg)'>
<div class='tape'></div>
<img src="67de9cdd-3f0b-4a73-b5f3-ac7cb167bdef.png">
<p> Worth adoring day and night </p>.</p>
</div>
</div>
<div id="light" onclick="this.style.display='none'"><img id="big"></div>
<script>
document.querySelectorAll('.card img').forEach(img=>img.onclick=e=>{big.src=e.target.src;light.style.display='flex';});
</script>
</body></html>
