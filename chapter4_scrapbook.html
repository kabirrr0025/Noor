<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Project Noor - Chapter 4</title>
  <style>
    body{margin:0;font-family:Arial;background:linear-gradient(#ffe4ef,#fffafc);overflow-x:hidden}
    h1{text-align:center;color:#ff4f8b;padding:30px 0}
    .notice{
      max-width:900px;margin:0 auto 16px;padding:14px 18px;border-radius:12px;
      background:rgba(43,31,43,0.9);color:#fff;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.12);
    }
    .grid{display:flex;flex-wrap:wrap;justify-content:center;gap:40px;padding:20px}
    .card{width:260px;background:#fff;padding:12px 12px 25px;border-radius:6px;box-shadow:0 15px 30px rgba(0,0,0,.15);position:relative;transition:.4s;cursor:pointer}
    .card:hover{transform:scale(1.05) rotate(0deg)!important}
    .card img{width:100%;border-radius:4px;display:block}
    .card p{font-family:cursive;text-align:center;margin:10px 0 0}
    .tape{position:absolute;width:90px;height:24px;background:#fff8cdbb;left:50%;top:-10px;transform:translateX(-50%) rotate(-3deg)}
    #light{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:999}
    #light img{max-width:90vw;max-height:85vh;border:12px solid white;border-radius:8px;box-shadow:0 8px 48px rgba(0,0,0,.6)}
    .close-btn{position:fixed;right:18px;top:14px;background:#fff;padding:8px 12px;border-radius:999px;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,.2)}
    @media (max-width:520px){ .card{width:44vw} }
  </style>
</head>
<body>
  <h1>📖 Our Little Scrapbook 🌸</h1>

  <!-- Non-blocking in-page notice instead of alert() -->
  <div class="notice" role="status" aria-live="polite">
    Welcome — this is chapter 4: your Polaroid Memory Gallery. Click any photo to view it larger. (No alert popup.)
  </div>

  <div class="grid" aria-live="polite">
    <div class='card' style='transform:rotate(-6deg)'>
      <div class='tape' aria-hidden="true"></div>
      <img src="8df95bc3-ce30-4f9c-b310-6aa3a1781ef1.png" alt="Photo 1" onerror="this.src='https://via.placeholder.com/260x180?text=Missing'">
      <p>FOOL JAISI TM BHI HO🌸</p>
    </div>

    <div class='card' style='transform:rotate(-4deg)'>
      <div class='tape' aria-hidden="true"></div>
      <img src="e6ca5323-d029-4bbf-b841-0ede90745732.png" alt="Photo 2" onerror="this.src='https://via.placeholder.com/260x180?text=Missing'">
      <p>Roots me Aditi gautam 🤍</p>
    </div>

    <div class='card' style='transform:rotate(-2deg)'>
      <div class='tape' aria-hidden="true"></div>
      <img src="918f81a2-e44a-4077-89d4-777805443ada.png" alt="Photo 3" onerror="this.src='https://via.placeholder.com/260x180?text=Missing'">
      <p>One of my favorite smiles ❤️</p>
    </div>

    <div class='card' style='transform:rotate(0deg)'>
      <div class='tape' aria-hidden="true"></div>
      <img src="7b99feaa-9d22-4339-a41a-fa34382c3ae2.png" alt="Photo 4" onerror="this.src='https://via.placeholder.com/260x180?text=Missing'">
      <p>BHONDU CERTIFIED😂</p>
    </div>

    <div class='card' style='transform:rotate(2deg)'>
      <div class='tape' aria-hidden="true"></div>
      <img src="971c8b47-a17a-4723-bf06-54ea8e90e145.png" alt="Photo 5" onerror="this.src='https://via.placeholder.com/260x180?text=Missing'">
      <p>inshort MERI BANDI ✨</p>
    </div>

    <div class='card' style='transform:rotate(4deg)'>
      <div class='tape' aria-hidden="true"></div>
      <img src="67de9cdd-3f0b-4a73-b5f3-ac7cb167bdef.png" alt="Photo 6" onerror="this.src='https://via.placeholder.com/260x180?text=Missing'">
      <p>Worth adoring day and night</p>
    </div>
  </div>

  <!-- Lightbox -->
  <div id="light" aria-hidden="true" tabindex="-1">
    <img id="big" alt="Expanded photo">
  </div>

  <script>
    // Explicitly reference elements (don't rely on implicit globals)
    const light = document.getElementById('light');
    const big = document.getElementById('big');

    // Open lightbox when any grid image is clicked
    document.querySelectorAll('.card img').forEach(img => {
      img.addEventListener('click', (e) => {
        big.src = e.currentTarget.src;
        light.style.display = 'flex';
        light.setAttribute('aria-hidden','false');
        // keep focus for accessibility so keyboard users can close it
        light.focus();
      });
    });

    // Close when clicking outside image (the #light container)
    light.addEventListener('click', (e) => {
      // only close when clicking the backdrop, not the image itself
      if (e.target === light) {
        light.style.display = 'none';
        light.setAttribute('aria-hidden','true');
        big.src = '';
      }
    });

    // Close with Escape key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && light.style.display === 'flex') {
        light.style.display = 'none';
        light.setAttribute('aria-hidden','true');
        big.src = '';
      }
    });

    // Optional: make images keyboard-accessible (Enter opens)
    document.querySelectorAll('.card img').forEach(img => {
      img.setAttribute('tabindex','0');
      img.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          img.click();
        }
      });
    });
  </script>
</body>
</html>
